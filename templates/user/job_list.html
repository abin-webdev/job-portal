{% extends "base.html" %}
{% block content %}

<h3 class="mb-3">Available Jobs</h3>

<!-- 🔍 SEARCH BAR -->
<form method="get" class="row mb-4">
    <div class="col-md-10 col-sm-9 mb-2">
        <input
            type="text"
            name="q"
            value="{{ query }}"
            class="form-control"
            placeholder="Search by job title, company, location or category"
        >
    </div>

    <div class="col-md-2 col-sm-3 mb-2">
        <button type="submit" class="btn btn-primary w-100">
            Search
        </button>
    </div>
</form>

<!-- 📋 JOBS TABLE -->
<table class="table table-bordered bg-white shadow">
    <thead class="table-light">
        <tr>
            <th>Title</th>
            <th>Company</th>
            <th>Location</th>
            <th>Category</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
    {% for job in jobs %}
        <tr>
            <td>{{ job.title }}</td>
            <td>{{ job.company.company_name }}</td>
            <td>{{ job.location }}</td>
            <td>{{ job.category }}</td>
            <td>
                <a href="{% url 'user_job_detail' job.id %}"
                   class="btn btn-primary btn-sm">
                    View
                </a>
            </td>
        </tr>
    {% empty %}
        <tr>
            <td colspan="5" class="text-center text-muted">
                No jobs found.
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>

{% endblock %}
