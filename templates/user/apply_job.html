
{% extends 'base.html' %}
{% block sidebar %}
  <a href="{% url 'user_dashboard' %}">Dashboard</a>
  <a href="{% url 'user_job_list' %}">Browse Jobs</a>
  <a href="{% url 'user_applications' %}">My Applications</a>
{% endblock %}
{% block content %}
  <h3>Apply for {{ job.title }}</h3>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
      <label>Resume (optional)</label>
      <input type="file" name="resume" class="form-control">
    </div>
    <div class="mb-3">
      <label>Cover Letter</label>
      <textarea name="cover_letter" class="form-control"></textarea>
    </div>
    <button class="btn btn-success">Submit Application</button>
  </form>
{% endblock %}
