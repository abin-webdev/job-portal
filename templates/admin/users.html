{% extends 'base.html' %}

{% block sidebar %}
  <a href="{% url 'admin_dashboard' %}">Dashboard</a>
  <a href="{% url 'admin_users' %}" class="active">Users</a>
  <a href="{% url 'admin_companies' %}">Companies</a>
  <a href="{% url 'admin_job_list' %}">Jobs</a>
  <a href="{% url 'admin_applications' %}">Applications</a>
{% endblock %}

{% block content %}
<h3>Users</h3>

<table class="table table-bordered bg-white shadow">
    <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    {% for u in users %}
    <tr>
        <td>{{ u.username }}</td>
        <td>{{ u.email }}</td>
        <td>
            <a href="{% url 'admin_delete_user' u.id %}" 
               class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure you want to delete this user?');">
                Delete
            </a>
        </td>
    </tr>

    {% empty %}
    <tr>
        <td colspan="3">No users found.</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
